[mypy]
python_version = 3.14
strict = true
warn_unused_configs = true
# Home Assistant components re-export public symbols (e.g. TrackerEntity,
# SourceType) at the package level; allow importing them the idiomatic way.
implicit_reexport = true
# The `imow` wrapper is a typed third-party dependency; a few of its methods
# lack return annotations. Allow calling them without failing strict mode
# (the integration's own code is still strictly typed).
untyped_calls_exclude = imow
